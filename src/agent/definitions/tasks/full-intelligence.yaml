# Full intelligence pass — the default task.
# Processes all unprocessed data: extraction, graph building, supersession, digest.

name: full-intelligence
displayName: Full Intelligence
description: >
  Complete intelligence pass over all unprocessed session data. Extracts
  observations as spores, builds knowledge graph entities and edges, runs
  supersession checks, updates session summaries, and regenerates digest
  extracts.
agent: myco-agent
prompt: >
  Process all unprocessed prompt batches and sessions. For each batch:
  extract observations as spores, identify entities and relationships for the
  knowledge graph, and check for supersession against existing spores.
  For each session touched, evaluate and update the session title and summary
  per the summary update criteria in your instructions. After processing all
  new data, regenerate digest extracts if the substrate has changed.
isDefault: true
maxTurns: 50
timeoutSeconds: 600
