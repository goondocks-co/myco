# Supersession sweep — find and resolve duplicate or outdated spores.

name: supersession-sweep
displayName: Supersession Sweep
description: >
  Scan active spores for duplicates, contradictions, and outdated
  observations. Supersede, resolve, or archive spores as appropriate.
  Records resolution events for audit trail.
agent: myco-agent
prompt: >
  Review all active spores. For each spore, search for semantically similar
  active spores. When duplicates or contradictions are found, resolve them
  by superseding the older or less accurate spore. When an observation is
  clearly outdated, archive it. Record resolution events with clear reasons
  for each action taken.
isDefault: false
maxTurns: 30
timeoutSeconds: 300
toolOverrides:
  - vault_spores
  - vault_search
  - vault_state
  - vault_resolve_spore
  - vault_set_state
  - vault_report
