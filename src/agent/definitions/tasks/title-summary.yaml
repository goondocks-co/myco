# =============================================================================
# Built-in Task: Title & Summary
# =============================================================================
# Lightweight task triggered by batch threshold or session stop.
# Only generates titles and summaries — no extraction or graph work.
# =============================================================================

name: title-summary
displayName: Title & Summary
description: >
  Generate titles and summaries for sessions that lack them. Reviews
  prompt batches and activities within each session to produce a concise
  title and informative summary.
agent: myco-agent
isDefault: false
maxTurns: 15
timeoutSeconds: 120

prompt: |
  Generate or update session titles and summaries. Budget: ~12 turns.

  IMPORTANT: If the User Instruction specifies a session ID, process
  ONLY that session. Do not scan or update other sessions.

  ## Phase 1 — Find Sessions Needing Updates (budget: 3 turns)

  1. If a specific session was requested in the instruction, use only that one.
     Otherwise, call `vault_sessions` with limit 10 to find candidates.
  2. Identify sessions where title is null, summary is null, or the
     title looks like a truncated first prompt (ends with "...")

  ## Phase 2 — Generate Titles and Summaries (budget: 8 turns)

  For each session needing updates:
  1. Call `vault_unprocessed` or review existing batches to understand
     what happened in the session
  2. Call `vault_update_session` with BOTH title and summary:
     - Title: under 80 characters, reflects the full session scope
     - Summary: 2-4 sentences capturing key work, tools used, outcomes

  ## Phase 3 — Report (budget: 1 turn)

  Call `vault_report` with action "summary":
  - Sessions updated: N
  - Sessions skipped (already current): N

toolOverrides:
  - vault_unprocessed
  - vault_sessions
  - vault_state
  - vault_update_session
  - vault_set_state
  - vault_report
