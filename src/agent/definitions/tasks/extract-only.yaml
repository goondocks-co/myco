# Extract-only task — spore extraction without graph building or digest.

name: extract-only
displayName: Extract Only
description: >
  Extract observations (spores) from unprocessed prompt batches without
  building graph entities/edges or regenerating digest. Useful for a
  quick pass that captures knowledge without full reasoning overhead.
agent: myco-curator
prompt: >
  Process all unprocessed prompt batches. For each batch, extract relevant
  observations as spores and update session summaries. Do not build graph
  entities or edges. Do not regenerate digest extracts. Mark batches as
  processed when complete.
isDefault: false
toolOverrides:
  - query_unprocessed
  - query_spores
  - semantic_search
  - get_agent_state
  - create_spore
  - update_session_summary
  - mark_processed
  - set_agent_state
