# Extract-only task — spore extraction without graph building or digest.

name: extract-only
displayName: Extract Only
description: >
  Extract observations (spores) from unprocessed prompt batches without
  building graph entities/edges or regenerating digest. Useful for a
  quick pass that captures knowledge without full reasoning overhead.
agent: myco-agent
prompt: >
  Process all unprocessed prompt batches. For each batch, extract relevant
  observations as spores. For each session touched, evaluate and update the
  session title and summary per the summary update criteria in your
  instructions. Do not build graph entities or edges. Do not regenerate
  digest extracts. Mark batches as processed when complete.
isDefault: false
toolOverrides:
  - vault_unprocessed
  - vault_spores
  - vault_search
  - vault_state
  - vault_create_spore
  - vault_update_session
  - vault_mark_processed
  - vault_set_state
  - vault_report
