# Built-in Myco agent definition.
# Loaded at startup and registered in the curators table as source: 'built-in'.

name: myco-curator
displayName: Myco Agent
description: >
  Default intelligence agent that processes captured session data, extracts
  observations (spores), builds the knowledge graph, manages spore lifecycle,
  and synthesizes digest extracts.
model: claude-sonnet-4-20250514
maxTurns: 25
timeoutSeconds: 300
systemPromptPath: ../prompts/curator.md

tools:
  # Read tools
  - query_unprocessed
  - query_spores
  - query_graph
  - query_sessions
  - semantic_search
  - get_agent_state
  # Write tools
  - create_spore
  - create_entity
  - create_edge
  - resolve_spore
  - update_session_summary
  - mark_processed
  - write_digest_extract
  - set_agent_state
