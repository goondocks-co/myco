    <path d="M1180,500 Q1110,460 1020,420" stroke-width="0.8"/>
    <path d="M1240,220 Q1170,230 1080,260" stroke-width="0.6"/>
    <path d="M500,60 Q520,120 540,180" stroke-width="0.8"/>
    <path d="M640,40 Q640,100 640,160" stroke-width="0.6"/>
    <path d="M780,60 Q760,120 740,180" stroke-width="0.8"/>
    <path d="M500,580 Q520,520 540,460" stroke-width="0.8"/>
    <path d="M640,600 Q640,540 640,480" stroke-width="0.6"/>
    <path d="M780,580 Q760,520 740,460" stroke-width="0.8"/>
  </g>

