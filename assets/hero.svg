    <circle cx="350" cy="270" r="3"/>
    <circle cx="910" cy="290" r="4"/>
    <circle cx="880" cy="350" r="3.5"/>
    <circle cx="930" cy="270" r="3"/>
    <circle cx="470" cy="280" r="3.5"/>
    <circle cx="810" cy="280" r="3.5"/>
  </g>

  <!-- The M mark — center focal point -->
  <g transform="translate(565, 230)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,150 L0,0 L75,67 L150,0 L150,150" stroke="#22c55e" fill="none" stroke-width="6" opacity="0.9"/>
    <circle cx="0" cy="150" r="8" fill="#22c55e" opacity="0.95"/>
    <circle cx="0" cy="0" r="8" fill="#4ade80" opacity="0.9"/>
