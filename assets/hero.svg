  <g stroke="#22c55e" fill="none" stroke-linecap="round" opacity="0.3">
    <path d="M370,290 Q420,285 470,280" stroke-width="1.5"/>
    <path d="M400,350 Q450,340 500,320" stroke-width="1.2"/>
    <path d="M350,270 Q410,260 460,255" stroke-width="1"/>
    <path d="M910,290 Q860,285 810,280" stroke-width="1.5"/>
    <path d="M880,350 Q830,340 780,320" stroke-width="1.2"/>
    <path d="M930,270 Q870,260 820,255" stroke-width="1"/>
