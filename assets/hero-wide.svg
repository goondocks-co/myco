    <circle cx="220" cy="175" r="3"/>
    <circle cx="260" cy="260" r="3"/>
    <circle cx="200" cy="155" r="2.5"/>
    <circle cx="1040" cy="200" r="3.5"/>
    <circle cx="1060" cy="175" r="3"/>
    <circle cx="1020" cy="260" r="3"/>
    <circle cx="1080" cy="155" r="2.5"/>
    <circle cx="540" cy="110" r="3"/>
    <circle cx="740" cy="110" r="3"/>
  </g>

  <!-- Inner network — dense connections near the M -->
  <g stroke="#22c55e" fill="none" stroke-linecap="round" opacity="0.3">
    <path d="M370,175 Q420,172 470,168" stroke-width="1.5"/>
    <path d="M400,215 Q450,205 500,195" stroke-width="1.2"/>
    <path d="M350,160 Q410,155 460,150" stroke-width="1"/>
    <path d="M910,175 Q860,172 810,168" stroke-width="1.5"/>
    <path d="M880,215 Q830,205 780,195" stroke-width="1.2"/>
    <path d="M930,160 Q870,155 820,150" stroke-width="1"/>
    <path d="M470,168 Q500,180 520,195" stroke-width="1"/>
    <path d="M810,168 Q780,180 760,195" stroke-width="1"/>
