    <path d="M60,180 Q130,170 220,175" stroke-width="0.8"/>
    <path d="M100,320 Q170,290 260,260" stroke-width="0.8"/>
    <path d="M40,130 Q110,140 200,155" stroke-width="0.6"/>
    <path d="M1200,250 Q1130,220 1040,200" stroke-width="1"/>
    <path d="M1220,180 Q1150,170 1060,175" stroke-width="0.8"/>
    <path d="M1180,320 Q1110,290 1020,260" stroke-width="0.8"/>
    <path d="M1240,130 Q1170,140 1080,155" stroke-width="0.6"/>
    <path d="M500,30 Q520,70 540,110" stroke-width="0.8"/>
    <path d="M640,20 Q640,60 640,100" stroke-width="0.6"/>
    <path d="M780,30 Q760,70 740,110" stroke-width="0.8"/>
    <path d="M500,370 Q520,330 540,290" stroke-width="0.8"/>
    <path d="M780,370 Q760,330 740,290" stroke-width="0.8"/>
  </g>

  <!-- Outer network nodes -->
  <g fill="#22c55e" opacity="0.1">
    <circle cx="80" cy="250" r="3"/>
    <circle cx="60" cy="180" r="2.5"/>
    <circle cx="100" cy="320" r="2"/>
    <circle cx="40" cy="130" r="2"/>
    <circle cx="1200" cy="250" r="3"/>
    <circle cx="1220" cy="180" r="2.5"/>
    <circle cx="1180" cy="320" r="2"/>
    <circle cx="1240" cy="130" r="2"/>
    <circle cx="500" cy="30" r="2"/>
    <circle cx="640" cy="20" r="2.5"/>
    <circle cx="780" cy="30" r="2"/>
    <circle cx="500" cy="370" r="2"/>
    <circle cx="780" cy="370" r="2"/>
  </g>

  <!-- Mid-range network — connecting branches -->
  <g stroke="#22c55e" fill="none" stroke-linecap="round" opacity="0.2">
    <path d="M240,200 Q300,190 370,175" stroke-width="1.2"/>
    <path d="M220,175 Q280,170 350,160" stroke-width="1"/>
    <path d="M260,260 Q330,235 400,215" stroke-width="1"/>
    <path d="M200,155 Q270,155 340,150" stroke-width="0.8"/>
    <path d="M1040,200 Q980,190 910,175" stroke-width="1.2"/>
    <path d="M1060,175 Q1000,170 930,160" stroke-width="1"/>
    <path d="M1020,260 Q950,235 880,215" stroke-width="1"/>
    <path d="M1080,155 Q1010,155 940,150" stroke-width="0.8"/>
    <path d="M540,110 Q570,130 600,145" stroke-width="1"/>
    <path d="M640,100 Q640,125 640,140" stroke-width="1"/>
    <path d="M740,110 Q710,130 680,145" stroke-width="1"/>
    <path d="M540,290 Q570,270 600,250" stroke-width="1"/>
    <path d="M740,290 Q710,270 680,250" stroke-width="1"/>
