    <circle cx="350" cy="160" r="3"/>
    <circle cx="910" cy="175" r="4"/>
    <circle cx="880" cy="215" r="3.5"/>
    <circle cx="930" cy="160" r="3"/>
    <circle cx="470" cy="168" r="3.5"/>
    <circle cx="810" cy="168" r="3.5"/>
  </g>

  <!-- The M mark — center focal point -->
  <g transform="translate(565, 110)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,150 L0,0 L75,67 L150,0 L150,150" stroke="#22c55e" fill="none" stroke-width="6" opacity="0.9"/>
    <circle cx="0" cy="150" r="8" fill="#22c55e" opacity="0.95"/>
    <circle cx="0" cy="0" r="8" fill="#4ade80" opacity="0.9"/>
    <circle cx="75" cy="67" r="9" fill="#22c55e"/>
    <circle cx="150" cy="0" r="8" fill="#4ade80" opacity="0.9"/>
    <circle cx="150" cy="150" r="8" fill="#22c55e" opacity="0.95"/>
    <line x1="0" y1="75" x2="75" y2="67" stroke="#4ade80" stroke-width="1.5" opacity="0.25"/>
    <line x1="75" y1="67" x2="150" y2="75" stroke="#4ade80" stroke-width="1.5" opacity="0.25"/>
    <circle cx="0" cy="75" r="4.5" fill="#86efac" opacity="0.4"/>
    <circle cx="150" cy="75" r="4.5" fill="#86efac" opacity="0.4"/>
  </g>

  <!-- Wordmark only — no tagline -->
  <text x="640" y="315" text-anchor="middle" font-family="'Geist Mono', 'SF Mono', 'Fira Code', monospace" font-size="52" font-weight="700" fill="#e2e8f0" letter-spacing="-2">myco</text>

  <!-- Subtle vignette -->
  <rect width="1280" height="400" fill="url(#networkFade)" opacity="0.05"/>
