version: 3
config_version: 2
embedding:
  provider: ollama
  model: bge-m3:latest
daemon:
  port: 21039
  log_level: debug
  log_retention_days: 30
capture:
  transcript_paths: []
  plan_dirs:
    - docs/superpowers/specs/
    - docs/superpowers/plans/
  artifact_extensions:
    - .md
  buffer_max_events: 500
agent:
  auto_run: true
  interval_seconds: 1800
  summary_batch_interval: 5
  provider:
    type: cloud
  tasks:
    full-intelligence:
      provider:
        type: cloud
        model: claude-sonnet-4-6
    title-summary:
      provider:
        type: cloud
        model: claude-sonnet-4-6
    title-summary-custom:
      provider:
        type: ollama
        base_url: http://localhost:11434
        model: glm-4.7-flash:latest
    review-session:
      provider:
        type: cloud
        model: claude-sonnet-4-6
context:
  digest_tier: 5000
  prompt_search: true
  prompt_max_spores: 3
backup:
  dir: /Users/chris/Repos
team:
  enabled: true
  worker_url: https://myco-team-71861c57.goondocks.workers.dev
  interval_minutes: 15
