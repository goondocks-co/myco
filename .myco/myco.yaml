version: 3
config_version: 2
embedding:
  provider: ollama
  model: bge-m3:latest
daemon:
  port: 21039
  log_level: debug
capture:
  transcript_paths: []
  artifact_watch:
    - .claude/plans/
    - .cursor/plans/
  artifact_extensions:
    - .md
  buffer_max_events: 500
agent:
  auto_run: false
  interval_seconds: 1800
  summary_batch_interval: 5
  provider:
    type: cloud
  tasks:
    full-intelligence:
      provider:
        type: cloud
        model: claude-sonnet-4-6
    title-summary:
      provider:
        type: cloud
        model: claude-sonnet-4-6
    title-summary-custom:
      provider:
        type: ollama
        base_url: http://localhost:11434
        model: glm-4.7-flash:latest
    review-session:
      provider:
        type: cloud
        model: claude-sonnet-4-6
