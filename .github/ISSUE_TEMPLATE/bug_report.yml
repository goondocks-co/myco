name: Bug Report
description: Something isn't working as expected.
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Daemon (capture, processing, lifecycle)
        - MCP tools (search, recall, remember, etc.)
        - Hooks (session start/stop, context injection)
        - Vault (indexing, embeddings, SQLite)
        - CLI commands (init, stats, logs, rebuild)
        - Dashboard (configuration, operations, topology)
        - Plugin installation / configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `/myco-setup` with Ollama
        2. Start a session
        3. Observe error in daemon logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run `myco logs --level warn` or check daemon.log
      render: text

  - type: input
    id: agent
    attributes:
      label: Agent
      placeholder: Claude Code / Cursor / VS Code Copilot

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15 / Ubuntu 24.04 / Windows 11

  - type: input
    id: llm
    attributes:
      label: LLM provider and model
      placeholder: Ollama / gpt-oss
