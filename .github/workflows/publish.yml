name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'          # stable: v0.1.0
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.*'   # alpha: v0.2.0-alpha.1
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.*'    # beta: v0.2.0-beta.1
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.*'      # release candidate: v0.2.0-rc.1

permissions:
  contents: write
  id-token: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_prerelease: ${{ steps.extract.outputs.is_prerelease }}
      npm_tag: ${{ steps.extract.outputs.npm_tag }}
    steps:
      - name: Extract version from tag
        id: extract
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [[ "$VERSION" =~ -alpha\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=alpha" >> "$GITHUB_OUTPUT"
            echo "Pre-release (alpha): $VERSION"
          elif [[ "$VERSION" =~ -beta\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
            echo "Pre-release (beta): $VERSION"
          elif [[ "$VERSION" =~ -rc\. ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
            echo "Pre-release (rc): $VERSION"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "Stable release: $VERSION"
          fi

  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: validate-tag
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set version in all manifests from tag
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "$VERSION" '.version = $v' .cursor-plugin/plugin.json > tmp.json && mv tmp.json .cursor-plugin/plugin.json
          echo "Synced version $VERSION across package.json + Claude/Cursor plugin manifests"

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

      - name: Pack npm tarball
        run: npm pack

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: goondocks-myco-*.tgz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [validate-tag, build]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: release-files

      - name: Generate release notes
        id: notes
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
          IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" --no-merges | head -50)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges | head -20)
          fi

          if [ "$IS_PRERELEASE" = "true" ]; then
            cat > release-notes.md <<NOTES_EOF
          ## Pre-release

          This is a pre-release and may contain bugs or incomplete features.
          Please report issues at https://github.com/goondocks-co/myco/issues

          ## What's Changed

          ${COMMITS}

          ## Install

          \`\`\`bash
          curl -fsSL https://myco.sh/install.sh | sh
          cd your-project
          myco init
          \`\`\`
          NOTES_EOF
          else
            cat > release-notes.md <<NOTES_EOF
          ## What's Changed

          ${COMMITS}

          ## Install

          \`\`\`bash
          curl -fsSL https://myco.sh/install.sh | sh
          cd your-project
          myco init
          \`\`\`

          ## Update

          \`\`\`bash
          npm update -g @goondocks/myco
          myco update
          \`\`\`
          NOTES_EOF
          fi

          sed -i 's/^          //' release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: v${{ needs.validate-tag.outputs.version }}
          body_path: release-notes.md
          files: release-files/*
          draft: false
          prerelease: ${{ needs.validate-tag.outputs.is_prerelease == 'true' }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npmjs.org
    runs-on: ubuntu-latest
    needs: [validate-tag, create-release]
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Update npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Set version in all manifests from tag
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "$VERSION" '.version = $v' .cursor-plugin/plugin.json > tmp.json && mv tmp.json .cursor-plugin/plugin.json

      - run: npm ci
      - run: npm run build

      - name: Publish package
        env:
          NPM_TAG: ${{ needs.validate-tag.outputs.npm_tag }}
        run: npm publish --tag "$NPM_TAG" --provenance --access public

      - name: Publish summary
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
          IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}
          NPM_TAG: ${{ needs.validate-tag.outputs.npm_tag }}
        run: |
          echo "## Published to npmjs.org" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "**npm tag:** $NPM_TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "**Pre-release:** $IS_PRERELEASE" >> "$GITHUB_STEP_SUMMARY"

  sync-version:
    name: Sync version to main
    runs-on: ubuntu-latest
    needs: [validate-tag, publish]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in all manifests
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          jq --arg v "$VERSION" '.version = $v' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          jq --arg v "$VERSION" '.version = $v' .cursor-plugin/plugin.json > tmp.json && mv tmp.json .cursor-plugin/plugin.json
          jq --arg v "$VERSION" '.plugins[0].source.version = $v' .cursor-plugin/marketplace.json > tmp.json && mv tmp.json .cursor-plugin/marketplace.json

      - name: Commit version bump
        env:
          VERSION: ${{ needs.validate-tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json .claude-plugin/plugin.json .cursor-plugin/plugin.json .cursor-plugin/marketplace.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: sync version to $VERSION [skip ci]"
          git push
